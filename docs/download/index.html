<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Download</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #17212b;
      --sub: #516273;
      --accent: #0b6cff;
      --accent2: #0a57cb;
      --line: #d9e1ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(1200px 600px at 20% -20%, #e8f0ff 0%, #f5f7fb 60%);
      color: var(--text);
      font: 16px/1.6 "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 40, 80, 0.08);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
    }
    p { margin: 8px 0; color: var(--sub); }
    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #cfe0ff;
      background: #eff5ff;
      color: #1e4a95;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      color: var(--text);
      background: #fff;
      font-weight: 600;
    }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    code {
      background: #f0f4f8;
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid #e1e7ee;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>OpenClaw Download</h1>
    <p>This is a unified download entry. We detect your system and redirect automatically.</p>
    <p id="detected"></p>
    <div id="status" class="status">Preparing download link...</div>
    <div class="actions">
      <a id="autoLink" class="btn primary" href="#">Download Now</a>
      <a id="winLink" class="btn" href="#">Windows (.exe)</a>
      <a id="allLink" class="btn" href="#">macOS/Linux/Universal (.zip)</a>
      <a id="releaseLink" class="btn" href="#">Latest Release</a>
    </div>
    <p style="margin-top:18px">
      If auto-detection is blocked, use manual links above.
    </p>
  </main>

  <script>
    (function () {
      function inferRepo() {
        var qs = new URLSearchParams(window.location.search);
        var repoParam = qs.get("repo");
        if (repoParam && /^[^/]+\/[^/]+$/.test(repoParam)) {
          return repoParam;
        }

        var host = window.location.hostname;
        var pathParts = window.location.pathname.split("/").filter(Boolean);
        if (host.endsWith(".github.io") && pathParts.length > 0) {
          var owner = host.split(".")[0];
          var repo = pathParts[0];
          return owner + "/" + repo;
        }

        return "";
      }

      function detectPlatform() {
        var ua = navigator.userAgent || "";
        var platform = navigator.platform || "";
        var text = ua + " " + platform;
        if (/Windows NT/i.test(text)) return "windows";
        if (/Macintosh|Mac OS X/i.test(text)) return "macos";
        if (/Linux|X11|Ubuntu|Debian|Fedora|CentOS|RHEL|Arch/i.test(text)) return "linux";
        return "unknown";
      }

      var repo = inferRepo();
      var detected = detectPlatform();
      var windowsAsset = "openclaw-installer-windows-setup.exe";
      var universalAsset = "openclaw-installer-universal.zip";
      var downloadAsset = detected === "windows" ? windowsAsset : universalAsset;

      var status = document.getElementById("status");
      var detectedEl = document.getElementById("detected");
      var autoLink = document.getElementById("autoLink");
      var winLink = document.getElementById("winLink");
      var allLink = document.getElementById("allLink");
      var releaseLink = document.getElementById("releaseLink");

      detectedEl.textContent = "Detected system: " + detected;

      if (!repo) {
        status.textContent = "Repository could not be inferred. Open this page via GitHub Pages, or append ?repo=owner/repo.";
        autoLink.removeAttribute("href");
        winLink.removeAttribute("href");
        allLink.removeAttribute("href");
        releaseLink.removeAttribute("href");
        return;
      }

      var releaseBase = "https://github.com/" + repo + "/releases/latest";
      var directBase = releaseBase + "/download/";
      var autoUrl = directBase + downloadAsset;
      var winUrl = directBase + windowsAsset;
      var allUrl = directBase + universalAsset;

      autoLink.href = autoUrl;
      winLink.href = winUrl;
      allLink.href = allUrl;
      releaseLink.href = releaseBase;

      status.textContent = "Redirecting to: " + downloadAsset;
      window.setTimeout(function () {
        window.location.href = autoUrl;
      }, 600);
    })();
  </script>
</body>
</html>
