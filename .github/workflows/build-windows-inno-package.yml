name: build-windows-inno-package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Build Inno Setup package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-inno-package.ps1

      - name: Upload Windows setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-installer-windows-setup
          path: dist/openclaw-installer-windows-setup.exe
