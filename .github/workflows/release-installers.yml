name: release-installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Build Universal Package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-universal-package.ps1

      - name: Build Windows Inno Package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-inno-package.ps1

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: OpenClaw Installer v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            dist/openclaw-installer-universal.zip
            dist/openclaw-installer-windows-setup.exe
