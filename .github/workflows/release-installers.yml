name: release-installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Version
        id: ver
        shell: powershell
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $refName = "${{ github.ref_name }}"
            if ($refName.StartsWith("v")) {
              $version = $refName.Substring(1)
            } else {
              throw "Unable to resolve version from input or tag."
            }
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Build Universal Package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-universal-package.ps1

      - name: Build Windows Inno Package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-inno-package.ps1

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: OpenClaw Installer v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/openclaw-installer-universal.zip
            dist/openclaw-installer-windows-setup.exe
