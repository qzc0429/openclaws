name: build-universal-package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal installer package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-universal-package.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-installer-universal
          path: dist/openclaw-installer-universal.zip
